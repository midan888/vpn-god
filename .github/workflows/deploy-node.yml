name: Deploy Node

on:
  push:
    branches: [main]
    paths:
      - 'node/**'
      - '.github/workflows/deploy-node.yml'
  workflow_dispatch:
    inputs:
      no_cache:
        description: 'Build with no Docker cache'
        required: false
        type: boolean
        default: false

env:
  NODE_IMAGE: ghcr.io/${{ github.repository }}/node

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./node
          push: true
          no-cache: ${{ inputs.no_cache == true }}
          tags: |
            ${{ env.NODE_IMAGE }}:${{ github.sha }}
            ${{ env.NODE_IMAGE }}:latest

